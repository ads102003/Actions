name: "Discord Notification"
description: "Send a Discord notification about build status"

inputs:
  webhook-url:
    description: "Discord webhook URL"
    required: true
  version:
    description: "Build version number"
    required: true

runs:
  using: "composite"
  steps:
    - name: Send Discord Notification
      uses: tsickert/discord-webhook@v7.0.0
      with:
        webhook-url: ${{ inputs.webhook-url }}
        embed-color: ${{ job.status == 'success' && '6284127' || '16538684' }}
        embed-description: "Build [${{ inputs.version }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) of ${{ github.repository }}@${{ github.ref_name }} by **${{ github.actor }}** ${{ job.status == 'success' && 'completed' || 'failed' }}"
